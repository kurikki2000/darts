<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DARTS">
<meta name="theme-color" content="#0a0a0f">
<title>DARTS COUNT UP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f; --sur: #13131a; --sur2: #1c1c28;
  --bdr: #2a2a3a; --acc: #e8ff47; --acc2: #ff6b35;
  --txt: #f0f0f8; --mut: #6b6b88; --grn: #47ffb4; --red: #ff4757;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
button, div[onclick] { touch-action: manipulation; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg); color: var(--txt);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  user-select: none;
  overscroll-behavior: none;
  touch-action: manipulation;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: linear-gradient(rgba(232,255,71,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,255,71,0.03) 1px,transparent 1px);
  background-size: 40px 40px;
}
.app {
  position: relative; z-index: 1;
  max-width: 480px; margin: 0 auto;
  padding: 8px;
  padding-top: max(8px, env(safe-area-inset-top));
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  height: 100svh; height: 100dvh;
  display: flex; flex-direction: column; gap: 5px;
  overflow: hidden;
}

/* Tabs */
.tabs { display: flex; gap: 4px; background: var(--sur); border-radius: 8px; padding: 3px; border: 1px solid var(--bdr); }
.tab { flex: 1; padding: 6px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 700; letter-spacing: 1px; color: var(--mut); transition: all 0.2s; }
.tab.on { background: var(--acc); color: #000; }

/* Views */
.view { display: flex; flex-direction: column; gap: 5px; flex: 1; min-height: 0; overflow: hidden; }
.hide { display: none !important; }

/* Round bar */
.rbar { display: flex; align-items: center; gap: 6px; background: var(--sur); border: 1px solid var(--bdr); border-radius: 8px; padding: 4px 8px; }
.rlbl { font-size: 9px; color: var(--mut); letter-spacing: 1px; }
.rnum { font-family: 'Bebas Neue', cursive; font-size: 14px; color: var(--txt); margin-top: 0; }
.rnum em { font-size: 13px; color: var(--mut); font-style: normal; }
.dots { display: flex; gap: 2px; flex-wrap: nowrap; }
.dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--bdr); display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: var(--mut); transition: all 0.3s; }
.dot.done { border-color: var(--acc); color: var(--acc); background: rgba(232,255,71,0.1); }
.dot.now { border-color: var(--acc2); color: var(--acc2); background: rgba(255,107,53,0.15); animation: pd 1.5s infinite; }
@keyframes pd { 0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,0.4)}50%{box-shadow:0 0 0 5px transparent} }

/* Score card */
.scard { background: var(--sur); border: 1px solid var(--bdr); border-radius: 8px; padding: 4px; text-align: center; }
.total { font-family: 'Bebas Neue', cursive; font-size: 48px; line-height: 1; color: var(--acc); letter-spacing: 4px; text-shadow: 0 0 40px rgba(232,255,71,0.3); transition: transform 0.15s; }
.total.bump { transform: scale(1.06); }
.rgrid { display: grid; grid-template-columns: repeat(8,1fr); gap: 3px; margin-top: 3px; }
.rcell { background: var(--sur2); border-radius: 4px; padding: 2px; text-align: center; }
.rcell .rn { font-size: 8px; color: var(--mut); letter-spacing: 0; }
.rcell .rv { font-family: 'Bebas Neue', cursive; font-size: 16px; color: var(--txt); line-height: 1; }
.rcell .rv.done { color: var(--acc2); }
.rcell.now-cell { border: 1px solid var(--acc2); }

/* Input section */
.isec { background: var(--sur); border: 1px solid var(--bdr); border-radius: 10px; padding: 6px; display: flex; flex-direction: column; gap: 5px; flex: 1; min-height: 0; }

/* Shortcuts */
.scrow { display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; }
.sc { background: var(--sur2); border: 1px solid rgba(232,255,71,0.25); border-radius: 12px; padding: 0; text-align: center; cursor: pointer; font-family: 'Bebas Neue', cursive; font-size: 58px; color: var(--acc); transition: background 0.08s; touch-action: manipulation; min-height: 60px; display: flex; align-items: center; justify-content: center; }
.sc:active, .sc.pressing { background: var(--acc); color: #000; transform: scale(0.93); }

/* Tenkey display */
.tkd { background: var(--sur2); border: 1px solid var(--bdr); border-radius: 8px; padding: 4px 10px; display: flex; align-items: center; justify-content: space-between; }
.tkv { font-family: 'Bebas Neue', cursive; font-size: 26px; color: var(--acc); letter-spacing: 3px; }
.tkv.empty { color: var(--mut); }
.tkh { font-size: 10px; color: var(--mut); text-align: right; }

/* Tenkey grid */
.tkg { display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(4,1fr); gap: 5px; flex: 1; min-height: 0; }
.tk { background: var(--sur2); border: 1px solid #4a4a5e; border-radius: 10px; padding: 0; min-height: 0; text-align: center; cursor: pointer; font-family: 'Bebas Neue', cursive; font-size: 40px; color: var(--txt); transition: background 0.08s; display: flex; align-items: center; justify-content: center; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
.tk:active, .tk.pressing { background: var(--acc); color: #000; transform: scale(0.94); }
.tk.wide { grid-column: span 2; }
.tk.del { color: var(--mut); font-size: 28px; }
.tk.del:active { background: var(--red); color: #fff; }
.tk.enter { background: var(--sur2); color: var(--mut); font-size: 22px; font-family: 'Noto Sans JP', sans-serif; font-weight: 700; border: 1px solid var(--bdr); }
.tk.enter.ready { background: var(--acc2); color: #fff; border-color: var(--acc2); }
.tk.del:active { background: var(--red); color: #fff; }

/* Action row */
.arow { display: flex; gap: 8px; }
.bok { flex: 1; background: var(--sur2); color: var(--mut); border: 1px solid var(--bdr); border-radius: 10px; padding: 8px; font-size: 13px; font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: all 0.15s; }
.bok.ready { background: var(--acc2); color: #fff; border-color: var(--acc2); }
.bok:disabled { opacity: 0.3; cursor: not-allowed; }
.breset { background: transparent; border: 1px solid var(--bdr); color: var(--mut); border-radius: 5px; padding: 2px 6px; font-size: 9px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.breset:hover { border-color: var(--red); color: var(--red); }
.bundo { background: transparent; border: 1px solid var(--acc2); color: var(--acc2); border-radius: 5px; padding: 2px 6px; font-size: 9px; font-weight: 700; cursor: pointer; display: none; white-space: nowrap; }
.bundo.show { display: inline-block; }
.breset:hover { border-color: var(--red); color: var(--red); }

/* Next game prompt */
.ngp { display: none; background: var(--sur); border: 1px solid var(--acc); border-radius: 14px; padding: 16px 20px; text-align: center; box-shadow: 0 0 30px rgba(232,255,71,0.1); }
.ngp.show { display: block; }
.ngp-t { font-family: 'Bebas Neue', cursive; font-size: 22px; color: var(--acc); letter-spacing: 3px; margin-bottom: 4px; }
.ngp-s { font-size: 11px; color: var(--mut); margin-bottom: 14px; }
.ngp-b { display: flex; gap: 8px; }
.ngp-b button { flex: 1; padding: 11px; border-radius: 10px; font-size: 13px; font-weight: 700; letter-spacing: 1px; cursor: pointer; }
.ngp-yes { background: var(--acc); color: #000; border: none; }
.ngp-no { background: transparent; border: 1px solid var(--bdr); color: var(--mut); }

/* Overlays */
.overlay { display: none; position: fixed; inset: 0; background: rgba(10,10,15,0.93); z-index: 100; align-items: center; justify-content: center; }
.overlay.show { display: flex; }

/* Result box */
.rbox { background: var(--sur); border: 1px solid var(--acc); border-radius: 20px; padding: 28px 36px; text-align: center; box-shadow: 0 0 60px rgba(232,255,71,0.15); max-width: 320px; width: 90%; }
.rt { font-family: 'Bebas Neue', cursive; font-size: 36px; color: var(--acc); letter-spacing: 6px; margin-bottom: 6px; }
.rs { font-family: 'Bebas Neue', cursive; font-size: 88px; line-height: 1; color: var(--txt); letter-spacing: 4px; }
.rstats { display: flex; justify-content: center; gap: 20px; margin: 14px 0; padding: 14px; background: var(--sur2); border-radius: 12px; }
.rst .rv { font-size: 20px; font-weight: 700; color: var(--acc2); }
.rst .rl { font-size: 10px; color: var(--mut); letter-spacing: 1px; margin-top: 2px; }
.rrounds { display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; margin-bottom: 14px; }
.rc { background: var(--sur2); border-radius: 8px; padding: 5px 4px; text-align: center; }
.rc .rv { font-size: 15px; font-weight: 700; }
.rc .rl { font-size: 9px; color: var(--mut); }
.rpb { font-size: 12px; color: var(--acc); font-weight: 700; letter-spacing: 2px; margin-bottom: 12px; display: none; }
.rbtns { display: flex; gap: 8px; }
.rbtns button { flex: 1; padding: 11px; border-radius: 10px; font-size: 13px; font-weight: 700; letter-spacing: 1px; cursor: pointer; }
.rb-new { background: var(--acc); color: #000; border: none; }
.rb-hist { background: transparent; border: 1px solid var(--bdr); color: var(--mut); }

/* Confirm box */
.cbox { background: var(--sur); border: 1px solid var(--red); border-radius: 16px; padding: 24px 28px; text-align: center; max-width: 280px; width: 90%; box-shadow: 0 0 40px rgba(255,71,87,0.2); }
.ct { font-size: 14px; color: var(--txt); font-weight: 700; margin-bottom: 6px; }
.cs { font-size: 11px; color: var(--mut); margin-bottom: 18px; line-height: 1.6; }
.cbtns { display: flex; gap: 8px; }
.cbtns button { flex: 1; padding: 11px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }
.cc { background: transparent; border: 1px solid var(--bdr); color: var(--mut); }
.cok { background: var(--red); color: #fff; border: none; }

/* Confetti overlay */
#confetti-canvas {
  position: fixed; inset: 0; z-index: 200;
  pointer-events: none; display: none;
}

/* Shortcut editor */
.sc-editor { display: none; flex-direction: column; gap: 8px; touch-action: auto; }
.sc-editor.show { display: flex; }
.sc-edit-title { font-size: 10px; color: var(--mut); letter-spacing: 2px; text-transform: uppercase; text-align: center; }
.sc-edit-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
.sc-edit-cell { display: flex; flex-direction: column; gap: 3px; align-items: center; }
.sc-edit-cell input {
  width: 100%; background: var(--sur2); border: 1px solid var(--bdr);
  border-radius: 8px; padding: 8px 4px; text-align: center;
  font-family: 'Bebas Neue', cursive; font-size: 22px; color: var(--acc);
  -webkit-appearance: none; outline: none;
  user-select: text; -webkit-user-select: text;
  touch-action: auto;
}
.sc-edit-cell input:focus { border-color: var(--acc); }
.sc-edit-btns { display: flex; gap: 8px; }
.sc-edit-save { flex: 1; background: var(--acc); color: #000; border: none; border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }
.sc-edit-cancel { flex: 1; background: transparent; border: 1px solid var(--bdr); color: var(--mut); border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }
.sc-customize-btn { background: transparent; border: none; color: var(--mut); font-size: 10px; cursor: pointer; padding: 2px 4px; letter-spacing: 1px; align-self: flex-end; }

/* Score chart */
.chart-wrap { background: var(--sur); border: 1px solid var(--bdr); border-radius: 12px; padding: 12px; }
.chart-title { font-size: 10px; color: var(--mut); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
.chart-canvas-wrap { position: relative; height: 120px; }
canvas.schart { width: 100%; height: 100%; }

/* History */
.hdr { display: flex; align-items: center; justify-content: space-between; }
.slbl { font-size: 10px; color: var(--mut); letter-spacing: 2px; text-transform: uppercase; padding: 4px 0; }
.bclr { background: transparent; border: 1px solid var(--bdr); color: var(--mut); border-radius: 8px; padding: 7px 12px; font-size: 11px; cursor: pointer; letter-spacing: 1px; }
.bclr:hover { border-color: var(--red); color: var(--red); }
.s3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.sc3 { background: var(--sur); border: 1px solid var(--bdr); border-radius: 12px; padding: 12px 8px; text-align: center; }
.sc3 .sv { font-family: 'Bebas Neue', cursive; font-size: 30px; color: var(--acc); letter-spacing: 2px; }
.sc3 .sl { font-size: 9px; color: var(--mut); letter-spacing: 1px; margin-top: 2px; }
.a3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.ac { background: var(--sur); border: 1px solid var(--bdr); border-radius: 12px; padding: 10px 6px; text-align: center; }
.ac .av { font-family: 'Bebas Neue', cursive; font-size: 26px; color: var(--grn); letter-spacing: 2px; }
.ac .al { font-size: 9px; color: var(--mut); line-height: 1.4; margin-top: 2px; }

/* Period table */
.pcrd { background: var(--sur); border: 1px solid var(--bdr); border-radius: 12px; overflow: hidden; }
.ptabs { display: flex; gap: 4px; padding: 8px 10px 0; }
.ptab { padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; letter-spacing: 1px; cursor: pointer; color: var(--mut); }
.ptab.on { background: var(--acc); color: #000; }
.pgrid { display: grid; grid-template-columns: auto 1fr 1fr auto auto; margin-top: 6px; }
.phd { display: contents; }
.phd span { padding: 5px 8px; font-size: 9px; color: var(--mut); letter-spacing: 1px; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid var(--bdr); background: var(--sur2); }
.phd span:not(:first-child) { text-align: center; }
.pr { display: contents; }
.pr > div { padding: 4px 6px; border-bottom: 1px solid var(--bdr); }
.pr:last-child > div { border-bottom: none; }
.plbl { color: var(--mut); font-size: 11px; display: flex; align-items: center; }
.pbest { text-align: center; font-family: 'Bebas Neue', cursive; font-size: 52px; color: var(--acc); display: flex; align-items: center; justify-content: center; }
.pavg  { text-align: center; font-family: 'Bebas Neue', cursive; font-size: 52px; color: var(--acc2); display: flex; align-items: center; justify-content: center; }
.pcnt  { text-align: center; font-size: 22px; font-weight: 700; color: var(--mut); display: flex; align-items: center; justify-content: center; }
.p180  { text-align: center; font-family: 'Bebas Neue', cursive; font-size: 52px; color: var(--grn); display: flex; align-items: center; justify-content: center; }
.pempty { padding: 14px 10px; font-size: 11px; color: var(--mut); grid-column: span 5; }

/* History list */
.hlist { display: flex; flex-direction: column; gap: 8px; }
.hi { background: var(--sur); border: 1px solid var(--bdr); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
.hsc { font-family: 'Bebas Neue', cursive; font-size: 52px; color: var(--txt); letter-spacing: 2px; min-width: 80px; }
.hsc.best { color: var(--acc); }
.hinf { flex: 1; }
.hdate { font-size: 11px; color: var(--mut); margin-bottom: 3px; }
.hpills { display: flex; gap: 3px; flex-wrap: wrap; }
.hpill { font-size: 10px; background: var(--sur2); border-radius: 4px; padding: 2px 5px; color: var(--mut); }
.hbdg { background: var(--acc); color: #000; font-size: 9px; font-weight: 700; border-radius: 4px; padding: 2px 5px; letter-spacing: 1px; }
.hdel { background: transparent; border: none; color: var(--mut); font-size: 16px; cursor: pointer; padding: 6px; border-radius: 6px; flex-shrink: 0; }
.hdel:hover { color: var(--red); }
.hempty { text-align: center; padding: 40px 20px; color: var(--mut); font-size: 13px; line-height: 1.8; }
.exp-row { display: flex; gap: 8px; margin-bottom: 4px; }
.bexp { flex: 1; background: transparent; border: 1px solid var(--bdr); color: var(--mut); border-radius: 8px; padding: 10px; font-size: 12px; font-weight: 700; letter-spacing: 1px; cursor: pointer; }
.bimp { flex: 1; background: transparent; border: 1px solid var(--bdr); color: var(--mut); border-radius: 8px; padding: 10px; font-size: 12px; font-weight: 700; letter-spacing: 1px; cursor: pointer; }
.hempty .ei { font-size: 36px; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="app">

  <div class="tabs">
    <div class="tab on" id="tgame" onclick="goTab('game')">🎯 ゲーム</div>
    <div class="tab" id="thist" onclick="goTab('hist')">📊 履歴</div>
  </div>

  <!-- Game view -->
  <div class="view" id="vgame" style="overflow:hidden;">
    <div class="ngp" id="ngp">
      <div class="ngp-t">ゲーム終了</div>
      <div class="ngp-s">次のゲームを始めますか？</div>
      <div class="ngp-b">
        <button class="ngp-no" onclick="ngpNo()">そのまま</button>
        <button class="ngp-yes" onclick="ngpYes()">次のゲームへ</button>
      </div>
    </div>
    <div class="rbar">
      <div>
        <div class="rlbl">ROUND</div>
        <div class="rnum" id="rnum">1 <em>/ 8</em></div>
      </div>
      <div class="dots" id="dots"></div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0;">
        <button class="bundo" id="bundo" onclick="undoRound()">↩ 修正</button>
        <button class="breset" onclick="resetGame()">↺ リセット</button>
      </div>
    </div>
    <div class="scard">
      <div class="total" id="total">0</div>
      <div class="rgrid" id="rgrid"></div>
    </div>
    <div class="isec" id="isec">
      <div style="display:flex;justify-content:flex-end;">
        <button class="sc-customize-btn" onclick="toggleScEditor()">⚙ カスタマイズ</button>
      </div>
      <div class="sc-editor" id="sc-editor">
        <div class="sc-edit-title">ショートカット編集（0〜180）</div>
        <div class="sc-edit-grid" id="sc-edit-grid"></div>
        <div class="sc-edit-btns">
          <button class="sc-edit-cancel" onclick="toggleScEditor()">キャンセル</button>
          <button class="sc-edit-save" onclick="saveScEditor()">保存</button>
        </div>
      </div>
      <div class="scrow" id="scrow">
        <div class="sc" data-fn="commit" data-arg="140">140</div>
        <div class="sc" data-fn="commit" data-arg="100">100</div>
        <div class="sc" data-fn="commit" data-arg="85">85</div>
        <div class="sc" data-fn="commit" data-arg="81">81</div>
        <div class="sc" data-fn="commit" data-arg="60">60</div>
        <div class="sc" data-fn="commit" data-arg="45">45</div>
        <div class="sc" data-fn="commit" data-arg="41">41</div>
        <div class="sc" data-fn="commit" data-arg="26">26</div>
      </div>
      <div class="tkd">
        <div class="tkv empty" id="tkv">—</div>
        <div class="tkh" id="tkh">合計点を入力してください</div>
      </div>
      <div class="tkg">
        <div class="tk" data-fn="kp" data-arg="1">1</div><div class="tk" data-fn="kp" data-arg="2">2</div><div class="tk" data-fn="kp" data-arg="3">3</div>
        <div class="tk" data-fn="kp" data-arg="4">4</div><div class="tk" data-fn="kp" data-arg="5">5</div><div class="tk" data-fn="kp" data-arg="6">6</div>
        <div class="tk" data-fn="kp" data-arg="7">7</div><div class="tk" data-fn="kp" data-arg="8">8</div><div class="tk" data-fn="kp" data-arg="9">9</div>
        <div class="tk del" data-fn="kd">⌫</div><div class="tk" data-fn="kp" data-arg="0">0</div><div class="tk enter" id="bok" data-fn="doOk">Enter</div>
      </div>
    </div>
  </div>

  <!-- History view -->
  <div class="view hide" id="vhist" style="overflow-y:auto;-webkit-overflow-scrolling:touch;">
    <div class="s3" id="hs3"></div>
    <div class="chart-wrap" id="chart-wrap" style="display:none;">
      <div class="chart-title">スコア推移</div>
      <div class="chart-canvas-wrap">
        <canvas class="schart" id="schart"></canvas>
      </div>
    </div>
    <div class="slbl">直近の平均スコア</div>
    <div class="a3" id="ha3"></div>
    <div class="slbl">期間別成績</div>
    <div id="hper"></div>
    <div class="exp-row">
      <button class="bexp" onclick="exportData()">📤 エクスポート</button>
      <button class="bexp" onclick="triggerImport()">📥 インポート</button>
      <input type="file" id="imp-file" accept=".json" style="position:absolute;left:-9999px;opacity:0;width:1px;height:1px;">
    </div>
    <div class="hdr">
      <div class="slbl">ゲーム履歴</div>
      <button class="bclr" onclick="openCfm()">全件削除</button>
    </div>
    <div class="hlist" id="hlist"></div>
  </div>

</div>

<!-- Result overlay -->
<div class="overlay" id="ovr">
  <div class="rbox">
    <div class="rt">FINISH!</div>
    <div class="rs" id="rscore"></div>
    <div style="font-size:10px;color:var(--mut);letter-spacing:1px;margin-bottom:6px;">TOTAL SCORE</div>
    <div class="rstats">

<canvas id="confetti-canvas"></canvas>
<script>
var ROUNDS = 8;
var g = { round: 1, scores: [], total: 0 };
var buf = '';

/* Round grid */
function drawRoundGrid() {
  var el = document.getElementById('rgrid');
  if (!el) return;
  el.innerHTML = '';
  for (var i = 1; i <= ROUNDS; i++) {
    var cell = document.createElement('div');
    var isDone = i <= g.scores.length;
    var isNow = i === g.round && !isDone;
    cell.className = 'rcell' + (isNow ? ' now-cell' : '');
    var score = isDone ? g.scores[i-1] : '—';
    cell.innerHTML = '<div class="rn">R'+i+'</div><div class="rv'+(isDone?' done':'')+'">'+score+'</div>';
    el.appendChild(cell);
  }
}

/* Dots */
function drawDots() {
  var el = document.getElementById('dots');
  el.innerHTML = '';
  for (var i = 1; i <= ROUNDS; i++) {
    var d = document.createElement('div');
    d.className = 'dot' + (i < g.round ? ' done' : i === g.round ? ' now' : '');
    d.textContent = i;
    el.appendChild(d);
  }
}

/* Commit round */
function commit(total) {
  if (g.scores.length >= ROUNDS) return;
  g.scores.push(total);
  g.total += total;
  buf = '';
  var el = document.getElementById('total');
  el.textContent = g.total;
  el.classList.add('bump');
  setTimeout(function(){ el.classList.remove('bump'); }, 200);
  drawRoundGrid();
  document.getElementById('bok').className = 'tk enter';
  updDisp();
  // undoボタンを表示（1ラウンド目完了後から）
  var ub = document.getElementById('bundo');
  if (ub) ub.className = g.scores.length >= 2 ? 'bundo show' : 'bundo';

  if (g.round >= ROUNDS) { setTimeout(showResult, 400); return; }
  g.round++;
  document.getElementById('rnum').innerHTML = g.round + ' <em>/ 8</em>';
  drawDots();
}

/* Tenkey */
function kp(d) {
  var n = buf + String(d);
  if (n.length > 3 || parseInt(n, 10) > 180) return;
  buf = n; updDisp();
}
function kd() { buf = buf.slice(0, -1); updDisp(); }
function doOk() {
  if (!buf) return;
  var v = parseInt(buf, 10);
  if (isNaN(v) || v < 0 || v > 180) return;
  commit(v);
}
function miss() { buf = ''; commit(0); }
function updDisp() {
  var ve = document.getElementById('tkv');
  var he = document.getElementById('tkh');
  var be = document.getElementById('bok');
  if (!buf) {
    ve.textContent = '—'; ve.className = 'tkv empty';
    he.textContent = '合計点を入力してください';
    be.className = 'tk enter';
  } else {
    var v = parseInt(buf, 10);
    var ok = !isNaN(v) && v >= 0 && v <= 180;
    ve.textContent = buf; ve.className = 'tkv';
    he.textContent = ok ? ('= ' + v + ' pt') : '⚠ 0〜180で入力';
    be.className = ok ? 'tk enter ready' : 'tk enter';
  }
}

/* Undo last round */
function undoRound() {
  if (g.scores.length === 0) return;
  var prevRound = g.scores.length;
  var prevScore = g.scores[g.scores.length - 1];
  var msg = 'R' + prevRound + ' の ' + prevScore + ' pt を取り消して入力し直しますか？';
  document.getElementById('undo-msg').textContent = msg;
  document.getElementById('oundo').classList.add('show');
}
function closeUndo() {
  document.getElementById('oundo').classList.remove('show');
}
function doUndo() {
  closeUndo();
  if (g.scores.length === 0) return;
  var last = g.scores.pop();
  g.total -= last;
  g.round = g.scores.length + 1;
  buf = '';
  document.getElementById('total').textContent = g.total;
  drawRoundGrid();
  document.getElementById('rnum').innerHTML = g.round + ' <em>/ 8</em>';
  document.getElementById('bok').className = 'tk enter';
  var ub = document.getElementById('bundo');
  if (ub) ub.className = g.scores.length >= 2 ? 'bundo show' : 'bundo';
  document.getElementById('isec').style.opacity = '';
  document.getElementById('isec').style.pointerEvents = '';
  updDisp();
  drawDots();
}

/* Rank */
function rank(s) {
  if (s>=1000) return 'S+'; if (s>=800) return 'S'; if (s>=700) return 'A+';
  if (s>=600) return 'A'; if (s>=500) return 'B+'; if (s>=400) return 'B';
  if (s>=300) return 'C'; return 'D';
}

/* Result */
function showResult() {
  var h = getH();
  var pb = 0; for (var i=0;i<h.length;i++) if(h[i].score>pb) pb=h[i].score;
  var isPB = g.total > pb;
  saveH({ score: g.total, rounds: g.scores.slice(), date: new Date().toISOString() });
  document.getElementById('rscore').textContent = g.total;
  document.getElementById('ravg').textContent = Math.round(g.total / ROUNDS);
  document.getElementById('rbest').textContent = Math.max.apply(null, g.scores);
  document.getElementById('rrank').textContent = rank(g.total);
  var html = '';
  for (var i=0;i<g.scores.length;i++) html += '<div class="rc"><div class="rv">'+g.scores[i]+'</div><div class="rl">R'+(i+1)+'</div></div>';
  document.getElementById('rrounds').innerHTML = html;
  document.getElementById('rpb').style.display = isPB ? 'block' : 'none';
  if (isPB) setTimeout(launchConfetti, 300);
  document.getElementById('ovr').classList.add('show');
}
function startNew() { document.getElementById('ovr').classList.remove('show'); resetState(); }
function goHist() { document.getElementById('ovr').classList.remove('show'); goTab('hist'); }

/* Reset */
function resetState() {
  g = { round: 1, scores: [], total: 0 }; buf = '';
  document.getElementById('total').textContent = '0';
  drawRoundGrid();
  document.getElementById('rnum').innerHTML = '1 <em>/ 8</em>';
  document.getElementById('bok').className = 'tk enter';
  document.getElementById('ngp').className = 'ngp';
  var ub = document.getElementById('bundo');
  if (ub) ub.className = 'bundo';
  document.getElementById('isec').style.opacity = '';
  document.getElementById('isec').style.pointerEvents = '';
  updDisp(); drawDots();
}
function resetGame() {
  if (g.scores.length > 0 && !window.confirm('ゲームをリセットしますか？')) return;
  resetState();
}

/* Next game prompt */
function ngpYes() { resetState(); }
function ngpNo() {
  document.getElementById('ngp').className = 'ngp';
  var ub = document.getElementById('bundo');
  if (ub) ub.className = 'bundo';
}

/* Tabs */
function goTab(tab) {
  document.getElementById('tgame').className = 'tab' + (tab==='game'?' on':'');
  document.getElementById('thist').className = 'tab' + (tab==='hist'?' on':'');
  document.getElementById('vgame').className = 'view' + (tab==='game'?'':' hide');
  document.getElementById('vhist').className = 'view' + (tab==='hist'?'':' hide');
  if (tab === 'game' && g.scores.length >= ROUNDS) {
    document.getElementById('ngp').className = 'ngp show';
    document.getElementById('isec').style.opacity = '0.3';
    document.getElementById('isec').style.pointerEvents = 'none';
  }
  if (tab === 'hist') renderHist();
}

/* Storage */
function getH() { try { return JSON.parse(localStorage.getItem('dh')||'[]'); } catch(e){ return []; } }
function saveH(e) { var h=getH(); h.unshift(e); localStorage.setItem('dh', JSON.stringify(h.slice(0,200))); }
function openCfm() { document.getElementById('ocfm').classList.add('show'); }
function closeCfm() { document.getElementById('ocfm').classList.remove('show'); }
function delAll() { localStorage.removeItem('dh'); closeCfm(); renderHist(); }
function delOne(i) { var h=getH(); h.splice(i,1); localStorage.setItem('dh',JSON.stringify(h)); renderHist(); }

/* ============================================================
   ショートカットカスタマイズ
   ============================================================ */
var DEFAULT_SC = [140, 100, 85, 81, 60, 45, 41, 26];

function getSC() {
  try {
    var s = localStorage.getItem('dh_sc');
    if (s) {
      var arr = JSON.parse(s);
      if (Array.isArray(arr) && arr.length === 8) return arr;
    }
  } catch(e) {}
  return DEFAULT_SC.slice();
}

function saveSC(arr) {
  localStorage.setItem('dh_sc', JSON.stringify(arr));
}

function buildScRow() {
  var row = document.getElementById('scrow');
  if (!row) return;
  row.innerHTML = '';
  var sc = getSC();
  sc.forEach(function(v) {
    var d = document.createElement('div');
    d.className = 'sc';
    d.setAttribute('data-fn', 'commit');
    d.setAttribute('data-arg', String(v));
    d.textContent = v;
    row.appendChild(d);
  });
}

function toggleScEditor() {
  var ed = document.getElementById('sc-editor');
  if (!ed) return;
  var isOpen = ed.classList.contains('show');
  if (!isOpen) {
    var sc = getSC();
    var grid = document.getElementById('sc-edit-grid');
    grid.innerHTML = '';
    sc.forEach(function(v, i) {
      var cell = document.createElement('div');
      cell.className = 'sc-edit-cell';
      var inp = document.createElement('input');
      inp.type = 'number';
      inp.min = '0';
      inp.max = '180';
      inp.value = v;
      inp.id = 'sc-inp-' + i;
      // iPhoneでフォーカス時に全選択（既存の数字をバックスペースで消せるように）
      inp.addEventListener('focus', function(){ var self = this; setTimeout(function(){ self.select(); }, 50); });
      inp.addEventListener('touchstart', function(e){ e.stopPropagation(); }, {passive: true});
      cell.appendChild(inp);
      grid.appendChild(cell);
    });
    ed.classList.add('show');
  } else {
    ed.classList.remove('show');
  }
}

function saveScEditor() {
  var sc = [];
  for (var i = 0; i < 8; i++) {
    var inp = document.getElementById('sc-inp-' + i);
    var v = parseInt(inp ? inp.value : '0', 10);
    if (isNaN(v) || v < 0 || v > 180) v = DEFAULT_SC[i];
    sc.push(v);
  }
  saveSC(sc);
  buildScRow();
  document.getElementById('sc-editor').classList.remove('show');
  // _fnsを再設定
  _fns.commit = commit;
}

/* ============================================================
   紙吹雪アニメーション
   ============================================================ */
function launchConfetti() {
  var canvas = document.getElementById('confetti-canvas');
  if (!canvas) return;
  canvas.style.display = 'block';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  var ctx = canvas.getContext('2d');
  var pieces = [];
  var colors = ['#e8ff47','#ff6b35','#47ffb4','#ff4757','#ffffff','#4fc3f7'];
  for (var i = 0; i < 120; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: Math.random() * 10 + 5,
      h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * 4 + 2,
      angle: Math.random() * 360,
      va: (Math.random() - 0.5) * 6,
    });
  }
  var frame = 0;
  var MAX = 90;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(function(p) {
      ctx.save();
      ctx.translate(p.x + p.w/2, p.y + p.h/2);
      ctx.rotate(p.angle * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, 1 - frame/MAX);
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.angle += p.va;
    });
    frame++;
    if (frame < MAX) requestAnimationFrame(draw);
    else { ctx.clearRect(0, 0, canvas.width, canvas.height); canvas.style.display = 'none'; }
  }
  draw();
}

/* ============================================================
   スコア推移グラフ
   ============================================================ */
function drawChart(hist) {
  var wrap = document.getElementById('chart-wrap');
  var canvas = document.getElementById('schart');
  if (!wrap || !canvas) return;
  if (hist.length < 2) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';

  var scores = hist.slice(0, 30).reverse().map(function(h){ return h.score; });
  var dpr = window.devicePixelRatio || 1;
  var W = canvas.offsetWidth || 300;
  var H = 120;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  var min = Math.min.apply(null, scores);
  var max = Math.max.apply(null, scores);
  var range = max - min || 1;
  var pad = { top: 10, right: 10, bottom: 20, left: 36 };
  var gw = W - pad.left - pad.right;
  var gh = H - pad.top - pad.bottom;

  // 背景グリッド
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for (var g = 0; g <= 4; g++) {
    var gy = pad.top + (gh / 4) * g;
    ctx.beginPath(); ctx.moveTo(pad.left, gy); ctx.lineTo(pad.left + gw, gy); ctx.stroke();
    var lv = Math.round(max - (range / 4) * g);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(lv, pad.left - 4, gy + 3);
  }

  // グラデーション塗り
  var pts = scores.map(function(s, i) {
    return {
      x: pad.left + (i / (scores.length - 1)) * gw,
      y: pad.top + gh - ((s - min) / range) * gh
    };
  });

  var grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + gh);
  grad.addColorStop(0, 'rgba(232,255,71,0.3)');
  grad.addColorStop(1, 'rgba(232,255,71,0)');
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pad.top + gh);
  pts.forEach(function(p){ ctx.lineTo(p.x, p.y); });
  ctx.lineTo(pts[pts.length-1].x, pad.top + gh);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // 折れ線
  ctx.beginPath();
  ctx.strokeStyle = '#e8ff47';
  ctx.lineWidth = 2;
  pts.forEach(function(p, i){ if (i===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y); });
  ctx.stroke();

  // ドット
  pts.forEach(function(p, i) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
    ctx.fillStyle = i === pts.length-1 ? '#ff6b35' : '#e8ff47';
    ctx.fill();
  });

  // X軸ラベル（最初・最後・中間）
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  [0, Math.floor(pts.length/2), pts.length-1].forEach(function(i) {
    if (pts[i]) ctx.fillText('G'+(i+1), pts[i].x, H - 4);
  });
}

/* Export / Import */
// inputのchangeイベントをJSで設定（iPhoneのSafari対応）
function exportData() {
  var h = getH();
  if (!h.length) { alert('履歴がありません'); return; }
  var json = JSON.stringify({ version: 1, exported: new Date().toISOString(), data: h }, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'darts_history_' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function triggerImport() {
  var input = document.getElementById('imp-file');
  input.value = '';
  input.click();
}

function importData(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var obj = JSON.parse(e.target.result);
      var incoming = obj.data || obj; // 配列直接 or {data:[...]}
      if (!Array.isArray(incoming)) throw new Error('形式が違います');
      var current = getH();
      // 日付で重複チェックしてマージ
      var dates = {};
      current.forEach(function(x){ dates[x.date] = true; });
      var added = 0;
      incoming.forEach(function(x) {
        if (!dates[x.date]) { current.push(x); added++; }
      });
      // 日付順で並べ直す
      current.sort(function(a,b){ return new Date(b.date) - new Date(a.date); });
      localStorage.setItem('dh', JSON.stringify(current.slice(0, 200)));
      renderHist();
      alert(added + '件のデータを追加しました（重複は除外）');
    } catch(err) {
      alert('読み込みに失敗しました: ' + err.message);
    }
    input.value = ''; // リセット
  };
  reader.readAsText(file);
}

/* Period stats */
var pTab = 'day';
function pad(n){ return n<10?'0'+n:''+n; }
function getPer(h, u) {
  var bk = {};
  for (var i=0;i<h.length;i++) {
    var d=new Date(h[i].date), k;
    if (u==='day') k=d.getFullYear()+'/'+pad(d.getMonth()+1)+'/'+pad(d.getDate());
    else if (u==='week') {
      var t=new Date(d); t.setHours(0,0,0,0); t.setDate(t.getDate()+4-(t.getDay()||7));
      var y=t.getFullYear(), w=Math.ceil((((t-new Date(y,0,1))/86400000)+1)/7);
      k=y+'-W'+pad(w);
    } else k=d.getFullYear()+'/'+pad(d.getMonth()+1);
    if (!bk[k]) bk[k]=[];
    bk[k].push(h[i]);
  }
  var limit = u === 'month' ? 24 : u === 'week' ? 12 : 30;
  return Object.keys(bk).sort(function(a,b){return b.localeCompare(a);}).slice(0,limit).map(function(k){
    var games=bk[k], sum=0, c180=0;
    for(var i=0;i<games.length;i++){
      sum+=games[i].score;
      var rounds=games[i].rounds||[];
      for(var j=0;j<rounds.length;j++) if(rounds[j]===180) c180++;
    }
    var sc=games.map(function(x){return x.score;});
    return {label:k, best:Math.max.apply(null,sc), avg:Math.round(sum/games.length), count:games.length, c180:c180};
  });
}
function renderPer(h) {
  var w=document.getElementById('hper');
  if (!h.length){w.innerHTML='';return;}
  var s=getPer(h,pTab);
  var tabs=[['day','日別'],['week','週別'],['month','月別']].map(function(t){
    return '<div class="ptab'+(pTab===t[0]?' on':'')+'" data-t="'+t[0]+'">'+t[1]+'</div>';
  }).join('');
  var rows=s.length?s.map(function(r){
    return '<div class="pr">'+
      '<div class="plbl">'+r.label+'</div>'+
      '<div class="pbest">'+r.best+'</div>'+
      '<div class="pavg">'+r.avg+'</div>'+
      '<div class="pcnt">'+r.count+'G</div>'+
      '<div class="p180">'+(r.c180>0?r.c180:'—')+'</div>'+
      '</div>';
  }).join('') : '<div class="pempty">データなし</div>';
  w.innerHTML='<div class="pcrd">'+
    '<div class="ptabs" id="ptabs">'+tabs+'</div>'+
    '<div class="pgrid">'+
    '<div class="phd"><span>期間</span><span>最高点</span><span>平均点</span><span>回数</span><span>180</span></div>'+
    rows+'</div></div>';
  document.getElementById('ptabs').addEventListener('click',function(e){
    var t=e.target.getAttribute('data-t');
    if(t){pTab=t;renderPer(getH());}
  });
}

/* Render history */
function renderHist() {
  var h=getH();
  var s3=document.getElementById('hs3');
  var a3=document.getElementById('ha3');
  var hl=document.getElementById('hlist');
  if (!h.length) {
    s3.innerHTML=''; a3.innerHTML=''; document.getElementById('hper').innerHTML='';
    var cw = document.getElementById('chart-wrap');
    if (cw) cw.style.display = 'none';
    hl.innerHTML='<div class="hempty"><div class="ei">🎯</div>まだ記録がありません。<br>ゲームを完了すると自動で保存されます。</div>';
    return;
  }
  var sc=h.map(function(x){return x.score;});
  var best=Math.max.apply(null,sc);
  var sum=0; for(var i=0;i<sc.length;i++) sum+=sc[i];
  s3.innerHTML=
    '<div class="sc3"><div class="sv">'+h.length+'</div><div class="sl">ゲーム数</div></div>'+
    '<div class="sc3"><div class="sv">'+best+'</div><div class="sl">自己ベスト</div></div>'+
    '<div class="sc3"><div class="sv">'+Math.round(sum/sc.length)+'</div><div class="sl">通算平均</div></div>';
  a3.innerHTML=[10,20,30].map(function(n){
    var sl=h.slice(0,n), s2=0;
    for(var i=0;i<sl.length;i++) s2+=sl[i].score;
    var v=sl.length?Math.round(s2/sl.length):null;
    return '<div class="ac"><div class="av">'+(v!==null?v:'—')+'</div><div class="al">直近'+n+'G<br>平均</div></div>';
  }).join('');
  renderPer(h);
  setTimeout(function(){ drawChart(h); }, 50);
  hl.innerHTML=h.map(function(x,idx){
    var isBest=x.score===best;
    var d=new Date(x.date);
    var ds=d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+pad(d.getMinutes());
    var pills=(x.rounds||[]).map(function(r,i){return '<span class="hpill">R'+(i+1)+':'+r+'</span>';}).join('');
    return '<div class="hi">'+
      '<div class="hsc'+(isBest?' best':'')+'">'+x.score+'</div>'+
      '<div class="hinf"><div class="hdate">'+ds+'　'+rank(x.score)+'ランク</div><div class="hpills">'+pills+'</div></div>'+
      (isBest?'<div class="hbdg">BEST</div>':'')+
      '<button class="hdel" onclick="delOne('+idx+')">🗑</button>'+
      '</div>';
  }).join('');
}

/* Keyboard */
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('vhist').classList.contains('hide')) return;
  if (e.key>='0'&&e.key<='9') kp(parseInt(e.key));
  else if (e.key==='Backspace'){e.preventDefault();kd();}
  else if (e.key==='Enter') doOk();
});

/* 高速タッチ処理 */
var _fns = { kp: kp, kd: kd, doOk: doOk, commit: commit };

function _exec(el) {
  var fn = el.getAttribute('data-fn');
  var arg = el.getAttribute('data-arg');
  if (!fn || !_fns[fn]) return;
  el.classList.add('pressing');
  setTimeout(function(){ el.classList.remove('pressing'); }, 100);
  if (arg !== null) _fns[fn](parseInt(arg, 10));
  else _fns[fn]();
}

document.addEventListener('touchstart', function(e) {
  // inputフィールド内・またはsc-editor内のタッチはpreventDefaultしない
  // iPhoneのSafariではe.targetが親要素になる場合があるため closest で確認
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.target.closest('.sc-editor')) return;
  var el = e.target.closest('[data-fn]');
  if (el) {
    e.preventDefault();
    _exec(el);
  }
}, {passive: false});

document.addEventListener('touchend', function(){}, {passive: true});
document.addEventListener('touchcancel', function(e) {
  document.querySelectorAll('.pressing').forEach(function(el){ el.classList.remove('pressing'); });
}, {passive: true});

// Chrome/マウス用: clickでも同じ処理（touchstart後は_lastTouchでスキップ）
var _lastTouch = 0;
document.addEventListener('touchstart', function(){ _lastTouch = Date.now(); }, {passive: true});
document.addEventListener('click', function(e) {
  if (Date.now() - _lastTouch < 500) return; // touchstart直後のclickは無視
  var el = e.target.closest('[data-fn]');
  if (el) _exec(el);
})
